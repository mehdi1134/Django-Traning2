{% extends "base.html" %}
{% block title %}
Home
{% endblock%}
{% block content %}

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold">My Todos</h1>

        <a href="{% url 'create' %}" class="btn btn-primary">
            + Create Record
        </a>
    </div>

    <!-- Todo List -->
    <div class="row">
        {% for todo in todos %}
                          <div class="col-md-6 col-lg-4 mb-4">

                  <div class="card shadow-sm h-100 border-0">
                <div class="card-body">

                    <h4 class="card-title text-primary fw-bold">
                        <a href="{% url 'details' todo.id %}" class="text-decoration-none">
                         {{ todo.title }}
                        </a> 
                    </h4>

                    <p class="card-text text-muted">
                        {{ todo.body }}
                    </p>

                </div>

                        <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center"
                    <small class="text-secondary">
                        Created: {{ todo.created }}
                    </small>
                          <!-- Delete Button -->
                    <form action="{% url 'delete' todo.id %}" method="POST" class="d-inline" onsubmit="return confirm('Are you sure you want to delete "{{ todo.title }}"?');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete {{ todo.title }}?');">
    Delete
</button>
                    </form>
                </div>
            </div>

        </div>
                                     {% empty %}
            <div class="col-12">
                <div class="alert alert-info">
                    No todos available.
                </div>
            </div>
        {% endfor %}
    </div>

</div>

{% endblock %}
